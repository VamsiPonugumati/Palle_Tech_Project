apiVersion: apps/v1
kind: Deployment

metadata:
  name: palletech-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: palletech

  template:
    metadata:
      labels:
        app: palletech

    spec:
      containers:
      - name: palletech-container

        image: vamsiponugumati19/palletech:latest

        ports:
        - containerPort: 8080

        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"

          limits:
            memory: "512Mi"
            cpu: "500m"

        readinessProbe:
          httpGet:
            path: /
            port: 8080

          initialDelaySeconds: 10
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /
            port: 8080

          initialDelaySeconds: 30
          periodSeconds: 10
